<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人综合空间 | Your Name</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-white font-sans">

    <nav class="fixed w-full z-50 bg-slate-900/80 backdrop-blur-md border-b border-purple-500/30">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-pink-500 bg-clip-text text-transparent">
                PORTFOLIO
            </div>
            <div class="hidden md:flex space-x-8">
                <a href="#" class="hover:text-cyan-400 transition-colors">首页</a>
                <a href="#about" class="hover:text-pink-400 transition-colors">关于</a>
                <a href="#work" class="hover:text-purple-400 transition-colors">作品</a>
                <a href="#contact" class="hover:text-yellow-400 transition-colors">联系方式</a>
            </div>
            <div class="md:hidden text-2xl">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <section class="relative h-screen flex items-center justify-center overflow-hidden">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&q=80&w=2000" 
             alt="Starry Night" 
             class="absolute inset-0 w-full h-full object-cover opacity-60">
        <div class="absolute inset-0 bg-gradient-to-b from-transparent via-slate-900/50 to-slate-900"></div>
        
        <div class="relative z-10 text-center px-4">
            <h1 class="text-5xl md:text-8xl font-black mb-6 tracking-tighter animate-fade-in">
                你好，我是 <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 via-pink-400 to-yellow-300">YOUR NAME</span>
            </h1>
            <p class="text-lg md:text-2xl mb-8 text-slate-300">逐梦星空的创作者 / 动漫美学爱好者</p>
            <a href="#work" class="px-8 py-4 bg-gradient-to-r from-cyan-500 to-purple-600 rounded-full font-bold text-lg hover:scale-105 transition-transform hover:shadow-[0_0_20px_rgba(34,211,238,0.6)]">
                了解更多
            </a>
        </div>
    </section>

    <section id="work" class="py-24 max-w-7xl mx-auto px-6">
        <h2 class="text-4xl font-bold mb-12 text-center">精选作品</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="group relative overflow-hidden rounded-2xl bg-slate-800 border border-slate-700 hover:border-pink-500 transition-all">
                <img src="https://images.unsplash.com/photo-1578632292335-df3abbb0d586?auto=format&fit=crop&q=80&w=600" class="w-full h-64 object-cover group-hover:scale-110 transition-duration-500" alt="Work 1">
                <div class="p-6">
                    <h3 class="text-xl font-bold mb-2 group-hover:text-cyan-400">数字艺术探索</h3>
                    <p class="text-slate-400 text-sm">结合星空色彩的视觉实验项目</p>
                </div>
            </div>
            <div class="group relative overflow-hidden rounded-2xl bg-slate-800 border border-slate-700 hover:border-cyan-500 transition-all">
                <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&q=80&w=600" class="w-full h-64 object-cover group-hover:scale-110 transition-duration-500" alt="Work 2">
                <div class="p-6">
                    <h3 class="text-xl font-bold mb-2 group-hover:text-pink-400">品牌视觉设计</h3>
                    <p class="text-slate-400 text-sm">为二次元品牌打造的独特标识</p>
                </div>
            </div>
            <div class="group relative overflow-hidden rounded-2xl bg-slate-800 border border-slate-700 hover:border-yellow-500 transition-all">
                <img src="https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&q=80&w=600" class="w-full h-64 object-cover group-hover:scale-110 transition-duration-500" alt="Work 3">
                <div class="p-6">
                    <h3 class="text-xl font-bold mb-2 group-hover:text-yellow-400">UI/UX 交互</h3>
                    <p class="text-slate-400 text-sm">流畅且富有生命力的用户体验</p>
                </div>
            </div>
        </div>
    </section>

    <section id="contact" class="py-24 bg-slate-950/50">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <h2 class="text-4xl font-bold mb-8">联系我</h2>
            <form class="space-y-6 text-left">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" placeholder="你的姓名" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-lg focus:outline-none focus:border-pink-500 transition-colors">
                    <input type="email" placeholder="你的邮箱" class="w-full bg-slate-800 border border-slate-700 p-4 rounded-lg focus:outline-none focus:border-cyan-500 transition-colors">
                </div>
                <textarea rows="4" placeholder="说点什么吧..." class="w-full bg-slate-800 border border-slate-700 p-4 rounded-lg focus:outline-none focus:border-purple-500 transition-colors"></textarea>
                <button class="w-full py-4 bg-white text-slate-900 font-bold rounded-lg hover:bg-cyan-400 hover:text-white transition-all transform hover:-translate-y-1">发送消息</button>
            </form>

            <div class="mt-16 flex justify-center space-x-8 text-2xl">
                <a href="#" class="text-slate-400 hover:text-cyan-400 transition-colors"><i class="fab fa-github"></i></a>
                <a href="#" class="text-slate-400 hover:text-pink-400 transition-colors"><i class="fab fa-instagram"></i></a>
                <a href="#" class="text-slate-400 hover:text-blue-400 transition-colors"><i class="fab fa-twitter"></i></a>
            </div>
            <p class="mt-8 text-slate-500 text-sm">© 2026 YourName Design. Built with Stars & Dreams.</p>
        </div>
    </section>

</body>
</html>
